    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: #8BD86D;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 80vw;
            height: 80vw;
            max-width: 1200px;
            max-height: 1200px;
            background: #5FCA35;
            filter: blur(92px);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: revealCircle 1.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: 280px;
            max-width: 80%;
            height: auto;
            margin: 0 auto 60px;
            display: block;
            animation: revealLogo 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-weight: 400;
            font-size: clamp(2.5rem, 6vw, 6rem);
            color: #FFFFFF;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 48px;
            width: 95%;
            margin-left: auto;
            margin-right: auto;
            animation: revealHeading 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s backwards;
        }



        .email-form {
            display: flex;
            gap: 12px;
            max-width: 480px;
            margin: 0 auto;
            animation: revealForm 1s cubic-bezier(0.16, 1, 0.3, 1) 0.9s backwards;
        }

        input[type="email"] {
            flex: 1;
            height: 56px;
            padding: 0 20px;
            border: 2px solid #c5bfb8;
            border-radius: 12px;
            background: #ffffff;
            font-size: 16px;
            font-family: 'Open Sans', sans-serif;
            color: #1a3d2b;
            transition: all 0.3s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: #6FCA35;
            box-shadow: 0 0 0 4px rgba(111, 202, 53, 0.1);
        }

        input[type="email"]::placeholder {
            color: #9a9690;
        }

        button {
            height: 56px;
            padding: 0 32px;
            background: #163D3D;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Open Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        button:hover {
            background: #0F2A2A;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(22, 61, 61, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: rgba(111, 202, 53, 0.1);
            border: 1px solid rgba(111, 202, 53, 0.3);
            border-radius: 12px;
            color: #1a3d2b;
            font-size: 15px;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .error-message {
            display: none;
            margin-top: 12px;
            color: #d64545;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes revealLogo {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(30px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes revealHeading {
            0% {
                opacity: 0;
                transform: translateY(40px);
                filter: blur(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        @keyframes revealForm {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes revealCircle {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.15);
                opacity: 0.75;
            }
        }

        @media (max-width: 600px) {
            .logo {
                margin-bottom: 40px;
            }

            h1 {
                margin-bottom: 36px;
            }

            .email-form {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <svg width="739" height="166" viewBox="0 0 739 166" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo">

        <h1>The Future of Nutrient<br>Delivery is Coming</h1>

        <form class="email-form" id="emailForm">
            <input 
                type="email" 
                id="email" 
                placeholder="Enter your email" 
                required
            >
            <button type="submit" id="submitBtn">Stay Tuned</button>
        </form>

        <div class="error-message" id="errorMessage">
            Please enter a valid email address
        </div>

        <div class="success-message" id="successMessage">
            🎉 Thank you! We'll notify you when we launch.
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxr97NX-Q64Q4QqNTdjx3zVa918qwJD5wVjmfYbqocar6eK6eXWpJaYDTtNVDVxu19wgA/exec';

        const form = document.getElementById('emailForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!email || !isValidEmail(email)) {
                errorMessage.classList.add('show');
                return;
            }

            errorMessage.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';

            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        timestamp: new Date().toISOString(),
                        email: email,
                        source: 'simple-page'
                    })
                });

                emailInput.value = '';
                successMessage.classList.add('show');
                
                setTimeout(() => {
                    successMessage.classList.remove('show');
                }, 5000);

            } catch (error) {
                errorMessage.textContent = 'Something went wrong. Please try again.';
                errorMessage.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Stay Tuned';
            }
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        emailInput.addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
    </script>
